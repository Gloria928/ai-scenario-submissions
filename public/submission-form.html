<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI场景编程 - 作业提交系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header h1 i {
            font-size: 2.5rem;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 1.1rem;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .form-group textarea {
            min-height: 200px;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.5;
            resize: vertical;
        }
        
        .code-editor {
            position: relative;
        }
        
        .code-header {
            background: #1f2937;
            color: white;
            padding: 12px 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Consolas', monospace;
        }
        
        .language-select {
            background: #374151;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .code-area {
            background: #1f2937;
            color: #e5e7eb;
            border: none;
            border-radius: 0 0 12px 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .code-area::placeholder {
            color: #9ca3af;
        }
        
        .char-count {
            text-align: right;
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 5px;
        }
        
        .char-count.warning {
            color: #f59e0b;
        }
        
        .char-count.error {
            color: #ef4444;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-container {
            margin-top: 30px;
            padding: 25px;
            border-radius: 12px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            display: none;
        }
        
        .status-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .status-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .status-icon {
            font-size: 1.5rem;
        }
        
        .status-success .status-icon { color: #10b981; }
        .status-error .status-icon { color: #ef4444; }
        .status-info .status-icon { color: #3b82f6; }
        
        .submission-id {
            background: #e5e7eb;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .instructions {
            background: white;
            border-left: 4px solid #4f46e5;
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
        }
        
        .instructions li {
            margin: 8px 0;
            padding-left: 5px;
        }
        
        .check-status-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .check-status-btn:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 0.9rem;
            border-top: 1px solid #e5e7eb;
        }
        
        .footer a {
            color: #4f46e5;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                border-radius: 15px;
            }
            
            .content {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-robot"></i>
                AI场景编程 - 作业提交
            </h1>
            <p>提交你的Python作业，获取自动评分和反馈</p>
        </div>
        
        <div class="content">
            <!-- API配置提示 -->
            <div id="configAlert" class="status-container show status-info">
                <div class="status-header">
                    <span class="status-icon">⚙️</span>
                    <span>系统配置提示</span>
                </div>
                <p><strong>重要：</strong>请先配置后端服务地址</p>
                <div class="instructions">
                    <p>部署完成后，请执行以下操作：</p>
                    <ol>
                        <li>获取你的Render.com部署地址</li>
                        <li>修改下方配置中的API地址</li>
                        <li>保存并重新加载页面</li>
                    </ol>
                </div>
                <div style="margin-top: 15px;">
                    <label for="apiUrlInput">后端API地址：</label>
                    <input type="text" id="apiUrlInput" placeholder="https://你的-render-地址.onrender.com" style="width: 100%; margin-top: 5px;">
                    <button class="check-status-btn" onclick="saveApiUrl()" style="margin-top: 10px;">
                        <i class="fas fa-save"></i> 保存配置
                    </button>
                </div>
            </div>
            
            <form id="submissionForm" style="display: none;">
                <div class="form-group">
                    <label for="studentName">
                        <i class="fas fa-user"></i> 姓名
                    </label>
                    <input type="text" id="studentName" placeholder="请输入你的姓名" required>
                </div>
                
                <div class="form-group">
                    <label for="studentId">
                        <i class="fas fa-id-card"></i> 学号（可选）
                    </label>
                    <input type="text" id="studentId" placeholder="请输入你的学号">
                </div>
                
                <div class="form-group">
                    <label for="assignment">
                        <i class="fas fa-book"></i> 作业题目
                    </label>
                    <select id="assignment" required>
                        <option value="">请选择作业题目</option>
                        <option value="作业1：Python基础">作业1：Python基础</option>
                        <option value="作业2：数据处理">作业2：数据处理</option>
                        <option value="作业3：函数与模块">作业3：函数与模块</option>
                        <option value="作业4：面向对象编程">作业4：面向对象编程</option>
                        <option value="作业5：Web开发基础">作业5：Web开发基础</option>
                        <option value="其他">其他（请在代码注释中说明）</option>
                    </select>
                </div>
                
                <div class="form-group code-editor">
                    <div class="code-header">
                        <span><i class="fas fa-code"></i> 代码编辑器</span>
                        <select id="language" class="language-select">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="java">Java</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <textarea 
                        id="code" 
                        class="code-area" 
                        placeholder="请在这里粘贴或输入你的代码...
示例：
def hello_world():
    print('Hello, World!')
    return 'Success'

if __name__ == '__main__':
    result = hello_world()
    print(f'结果: {result}')" 
                        required
                    ></textarea>
                    <div id="charCount" class="char-count">0/5000 字符</div>
                </div>
                
                <div class="form-group">
                    <label for="comments">
                        <i class="fas fa-comment"></i> 备注说明（可选）
                    </label>
                    <textarea 
                        id="comments" 
                        placeholder="如果有特殊说明或要求，请在这里填写..."
                        rows="3"
                    ></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-paper-plane"></i>
                    提交作业
                </button>
            </form>
            
            <div id="statusContainer" class="status-container">
                <!-- 状态信息会动态显示在这里 -->
            </div>
        </div>
        
        <div class="footer">
            <p>
                <i class="fas fa-info-circle"></i>
                系统由顾三为Gloria928老师定制 | 
                <a href="https://github.com/Gloria928/ai-scenario-submissions" target="_blank">
                    <i class="fab fa-github"></i> GitHub仓库
                </a>
            </p>
            <p>提交后通常需要1-3分钟完成评分，请保存好提交ID以便查询</p>
        </div>
    </div>

    <script>
        // 配置 - 从localStorage读取或使用默认值
        let API_BASE_URL = localStorage.getItem('ai_scenario_api_url') || '';
        
        // 元素引用
        const form = document.getElementById('submissionForm');
        const codeTextarea = document.getElementById('code');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const statusContainer = document.getElementById('statusContainer');
        const languageSelect = document.getElementById('language');
        const configAlert = document.getElementById('configAlert');
        const apiUrlInput = document.getElementById('apiUrlInput');
        
        // 初始化页面
        function initPage() {
            if (API_BASE_URL && API_BASE_URL.trim() !== '') {
                // 已有配置，隐藏配置提示，显示表单
                configAlert.style.display = 'none';
                form.style.display = 'block';
                apiUrlInput.value = API_BASE_URL;
                
                // 测试连接
                testConnection();
            } else {
                // 没有配置，显示配置提示
                configAlert.style.display = 'block';
                form.style.display = 'none';
            }
        }
        
        // 保存API地址
        function saveApiUrl() {
            const url = apiUrlInput.value.trim();
            if (!url) {
                alert('请输入API地址');
                return;
            }
            
            // 验证URL格式
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('API地址必须以 http:// 或 https:// 开头');
                return;
            }
            
            // 保存到localStorage
            localStorage.setItem('ai_scenario_api_url', url);
            API_BASE_URL = url;
            
            // 重新初始化页面
            initPage();
            
            // 显示成功消息
            showStatus('success', 'API地址配置成功！');
        }
        
        // 测试连接
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    showStatus('success', `✅ 后端服务连接成功！\n教师：${data.teacher}\n学生：${data.students}人`);
                } else {
                    showStatus('error', '❌ 后端服务连接失败，请检查地址是否正确');
                }
            } catch (error) {
                showStatus('error', '❌ 无法连接到后端服务，请检查网络和地址');
            }
        }
        
        // 字符计数
        codeTextarea.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = `${length}/5000 字符`;
            
            if (length > 4500) {
                charCount.className = 'char-count warning';
            } else if (length > 5000) {
                charCount.className = 'char-count error';
            } else {
                charCount.className = 'char-count';
            }
        });
        
        // 语言选择改变代码提示
        languageSelect.addEventListener('change', function() {
            const language = this.value;
            let placeholder = '';
            
            switch(language) {
                case 'python':
                    placeholder = `请在这里粘贴或输入你的Python代码...
示例：
def hello_world():
    print('Hello, World!')
    return 'Success'

if __name__ == '__main__':
    result = hello_world()
    print(f'结果: {result}')`;
                    break;
                case 'javascript':
                    placeholder = `请在这里粘贴或输入你的JavaScript代码...
示例：
function helloWorld() {
    console.log('Hello, World!');
    return 'Success';
}

// 调用函数
const result = helloWorld();
console.log(\`结果: \${result}\`);`;
                    break;
                case 'java':
                    placeholder = `请在这里粘贴或输入你的Java代码...
示例：
public class HelloWorld {
    public static void main(String[] args) {
        System.out.println("Hello, World!");
        String result = helloWorld();
        System.out.println("结果: " + result);
    }
    
    public static String helloWorld() {
        return "Success";
    }
}`;
                    break;
                default:
                    placeholder = '请在这里粘贴或输入你的代码...';
            }
            
            codeTextarea.placeholder = placeholder;
        });
        
        // 表单提交
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const studentName = document.getElementById('studentName').value.trim();
            const studentId = document.getElementById('studentId').value.trim();
            const assignment = document.getElementById('assignment').value;
            const language = languageSelect.value;
            const code = codeTextarea.value.trim();
            const comments = document.getElementById('comments').value.trim();
            
            // 验证
            if (!studentName) {
                showStatus('error', '请输入姓名');
                return;
            }
            
            if (!assignment) {
                showStatus('error', '请选择作业题目');
                return;
            }
            
            if (!code) {
                showStatus('error', '请输入代码');
                return;
            }
            
            if (code.length > 5000) {
                showStatus('error', '代码过长，请控制在5000字符以内');
                return;
            }
            
            if (code.length < 10) {
                showStatus('error', '代码过短，请提交完整的代码');
                return;
            }
            
            // 禁用提交按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';
            
            try {
                // 显示提交中状态
                showStatus('info', '正在提交作业，请稍候...');
                
                // 准备提交数据
                const submissionData = {
                    studentName,
                    studentId: studentId || undefined,
                    assignment,
                    language,
                    code,
                    comments: comments || undefined
                };
                
                // 发送请求
                const response = await fetch(`${API_BASE_URL}/api/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(submissionData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 显示成功状态
                    const submissionId = result.data.submissionId;
                    showSubmissionSuccess(submissionId, result.data);
                    
                    // 重置表单
                    form.reset();
                    codeTextarea.value = '';
                    charCount.textContent = '0/5000 字符';
                    charCount.className = 'char-count';
                    
                } else {
                    // 显示错误
                    showStatus('error', result.message || '提交失败');
                }
                
            } catch (error) {
                console.error('提交错误:', error);
                showStatus('error', '网络错误，请检查网络连接后重试');
            } finally {
                // 恢复提交按钮
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 提交作业';
            }
        });
        
        // 显示状态信息
        function showStatus(type, message) {
            let icon = 'ℹ️';
            let title = '信息';
            
            switch(type) {
                case 'success':
                    icon = '✅';
                    title = '成功';
                    break;
                case 'error':
                    icon = '❌';
                    title = '错误';
                    break;
                case 'info':
                    icon = '⏳';
                    title = '处理中';
                    break;
            }
            
            statusContainer.innerHTML = `
                <div class="status-header status-${type}">
                    <span class="status-icon">${icon}</span>
                    <span>${title}</span>
                </div>
                <p>${message}</p>
            `;
            
            statusContainer.classList.add('show');
            
            // 如果是错误信息，5秒后自动隐藏
            if (type === 'error') {
                setTimeout(() => {
                    statusContainer.classList.remove('show');
                }, 5000);
            }
        }
        
        // 显示提交成功信息
        function showSubmissionSuccess(submissionId, data) {
            statusContainer.innerHTML = `
                <div class="status-header status-success">
                    <span class="status-icon">✅</span>
                    <span>作业提交成功！</span>
                </div>
                
                <p>你的作业已成功接收，正在提交到评分系统。</p>
                
                <div class="submission-id">
                    <strong>提交ID：</strong>${submissionId}
                </div>
                
                <p><strong>重要：</strong>请保存好这个提交ID，用于查询评分结果。</p>
                
                <div class="instructions">
                    <p><strong>接下来：</strong></p>
                    <ol>
                        <li>系统正在处理你的提交</li>
                        <li>通常需要1-3分钟完成评分</li>
                        <li>评分完成后会显示详细报告</li>
                        <li>你可以使用提交ID随时查询状态</li>
                    </ol>
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="check-status-btn" onclick="checkStatus('${submissionId}')">
                        <i class="fas fa-sync-alt"></i> 立即查询状态
                    </button>
                    <button class="check-status-btn" onclick="copySubmissionId('${submissionId}')" style="background: #6b7280; margin-left: 10px;">
                        <i class="fas fa-copy"></i> 复制提交ID
                    </button>
                </div>
                
                <div style="margin-top: 20px; font-size: 0.9rem; color: #6b7280;">
                    <p><i class="fas fa-clock"></i> 提交时间：${new Date().toLocaleString('zh-CN')}</p>
                    <p><i class="fas fa-info-circle"></i> 预计评分完成时间：1-3分钟</p>
                </div>
            `;
            
            statusContainer.classList.add('show');
            
            // 自动开始轮询状态
            setTimeout(() => {
                checkStatus(submissionId);
            }, 3000);
        }
        
        // 查询提交状态
        async function checkStatus(submissionId) {
            try {
                // 显示查询中状态
                const statusBtn = document.querySelector(`button[onclick="checkStatus('${submissionId}')"]`);
                if (statusBtn) {
                    const originalText = statusBtn.innerHTML;
                    statusBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 查询中...';
                    statusBtn.disabled = true;
                    
                    setTimeout(() => {
                        statusBtn.innerHTML = originalText;
                        statusBtn.disabled = false;
                    }, 2000);
                }
                
                const response = await fetch(`${API_BASE_URL}/api/status/${submissionId}`);
                const result = await response.json();
                
                if (result.success) {
                    updateStatusDisplay(submissionId, result.data);
                } else {
                    showStatus('error', result.message || '查询失败');
                }
                
            } catch (error) {
                console.error('查询状态错误:', error);
                showStatus('error', '查询失败，请稍后重试');
            }
        }
        
        // 更新状态显示
        function updateStatusDisplay(submissionId, data) {
            let statusHtml = '';
            let statusType = 'info';
            
            switch(data.status) {
                case 'pending':
                    statusHtml = `
                        <div class="status-header status-info">
                            <span class="status-icon">⏳</span>
                            <span>等待处理</span>
                        </div>
                        <p>你的作业已接收，正在排队等待处理。</p>
                        <p><strong>已等待：</strong>${data.elapsedMinutes}分钟</p>
                    `;
                    break;
                    
                case 'processing':
                    statusHtml = `
                        <div class="status-header status-info">
                            <span class="status-icon">⚙️</span>
                            <span>正在处理</span>
                        </div>
                        <p>正在提交到GitHub评分系统...</p>
                        <p><strong>已等待：</strong>${data.elapsedMinutes}分钟</p>
                    `;
                    break;
                    
                case 'submitted':
                    statusHtml = `
                        <div class="status-header status-info">
                            <span class="status-icon">📤</span>
                            <span>已提交到GitHub</span>
                        </div>
                        <p>作业已成功提交到GitHub，等待自动评分。</p>
                        ${data.estimatedTime ? `<p><strong>${data.estimatedTime}</strong></p>` : ''}
                        <p><strong>已等待：</strong>${data.elapsedMinutes}分钟</p>
                        
                        ${data.githubIssue ? `
                        <div style="margin-top: 15px; padding: 10px; background: #f0f9ff; border-radius: 8px;">
                            <p><i class="fab fa-github"></i> <strong>GitHub Issue：</strong> #${data.githubIssue.number}</p>
                            <p><strong>状态：</strong> ${data.githubIssue.state === 'open' ? '待评分' : '已评分'}</p>
                        </div>
                        ` : ''}
                    `;
                    break;
                    
                case 'graded':
                    statusType = 'success';
                    statusHtml = `
                        <div class="status-header status-success">
                            <span class="status-icon">🏆</span>
                            <span>评分完成！</span>
                        </div>
                        
                        <div style="text-align: center; margin: 20px 0;">
                            <div style="font-size: 3rem; font-weight: bold; color: #10b981;">
                                ${data.score}/100
                            </div>
                            <div style="font-size: 1.2rem; color: #374151; margin-top: 10px;">
                                ${data.grade}
                            </div>
                        </div>
                        
                        ${data.githubIssue && data.githubIssue.comments ? `
                        <div style="margin-top: 20px;">
                            <h3 style="margin-bottom: 10px;">📋 评分报告</h3>
                            <div style="background: #f9fafb; padding: 15px; border-radius: 8px; max-height: 300px; overflow-y: auto;">
                                ${data.githubIssue.comments
                                    .filter(comment => comment.isGrading)
                                    .map(comment => `
                                        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #e5e7eb;">
                                            <div style="font-size: 0.9rem; color: #6b7280; margin-bottom: 5px;">
                                                ${new Date(comment.createdAt).toLocaleString('zh-CN')}
                                            </div>
                                            <div style="white-space: pre-wrap; font-family: 'Consolas', monospace;">
                                                ${comment.body}
                                            </div>
                                        </div>
                                    `).join('')}
                            </div>
                        </div>
                        ` : ''}
                        
                        <div style="margin-top: 20px;">
                            <button class="check-status-btn" onclick="checkStatus('${submissionId}')">
                                <i class="fas fa-redo"></i> 刷新结果
                            </button>
                            ${data.githubIssue ? `
                            <a href="${data.githubIssue.url}" target="_blank" class="check-status-btn" style="background: #24292e; text-decoration: none; display: inline-block; margin-left: 10px;">
                                <i class="fab fa-github"></i> 查看GitHub
                            </a>
                            ` : ''}
                        </div>
                    `;
                    break;
                    
                case 'failed':
                    statusType = 'error';
                    statusHtml = `
                        <div class="status-header status-error">
                            <span class="status-icon">❌</span>
                            <span>提交失败</span>
                        </div>
                        <p>作业提交失败，请稍后重试。</p>
                        ${data.githubError ? `<p><strong>错误信息：</strong>${data.githubError}</p>` : ''}
                        <div style="margin-top: 15px;">
                            <button class="check-status-btn" onclick="location.reload()">
                                <i class="fas fa-redo"></i> 重新提交
                            </button>
                        </div>
                    `;
                    break;
                    
                default:
                    statusHtml = `
                        <div class="status-header status-info">
                            <span class="status-icon">❓</span>
                            <span>未知状态</span>
                        </div>
                        <p>无法获取提交状态，请稍后重试。</p>
                    `;
            }
            
            // 添加基本信息
            statusHtml += `
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #e5e7eb;">
                    <p><strong>学生：</strong>${data.studentName}</p>
                    <p><strong>作业：</strong>${data.assignment}</p>
                    <p><strong>语言：</strong>${data.language}</p>
                    <p><strong>提交时间：</strong>${new Date(data.submittedAt).toLocaleString('zh-CN')}</p>
                    <p><strong>当前状态：</strong>${data.statusMessage}</p>
                </div>
            `;
            
            // 如果不是最终状态，添加自动刷新
            if (data.status !== 'graded' && data.status !== 'failed') {
                statusHtml += `
                    <div style="margin-top: 15px; font-size: 0.9rem; color: #6b7280;">
                        <p><i class="fas fa-sync-alt"></i> 10秒后自动刷新状态...</p>
                    </div>
                `;
                
                // 10秒后自动刷新
                setTimeout(() => {
                    checkStatus(submissionId);
                }, 10000);
            }
            
            statusContainer.innerHTML = statusHtml;
            statusContainer.classList.add('show');
        }
        
        // 复制提交ID
        function copySubmissionId(submissionId) {
            navigator.clipboard.writeText(submissionId).then(() => {
                const btn = document.querySelector(`button[onclick="copySubmissionId('${submissionId}')"]`);
                if (btn) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                    btn.style.background = '#10b981';
                    
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = '#6b7280';
                    }, 2000);
                }
            }).catch(err => {
                console.error('复制失败:', err);
                showStatus('error', '复制失败，请手动复制');
            });
        }
        
        // 页面加载时初始化
        window.addEventListener('load', function() {
            initPage();
            
            // 检查URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('submissionId');
            
            if (submissionId && API_BASE_URL) {
                checkStatus(submissionId);
            }
        });
    </script>
</body>
</html>
